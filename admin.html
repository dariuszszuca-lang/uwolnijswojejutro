<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admina | Uwolnij Swoje Jutro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#faf8f5;--bg-card:#ffffff;--text:#3d3a36;--text-light:#7a756e;--text-lighter:#a8a29e;
--sage:#8b9e7e;--sage-light:#d4dece;--sage-bg:#f0f3ed;
--rose:#c4918a;--rose-light:#e8cfc9;--rose-bg:#faf0ee;
--gold:#b89f6a;--border:#e8e4df;
--shadow:0 2px 12px rgba(0,0,0,.06);
--radius:12px;--transition:all .3s ease;
}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;font-size:16px}
h1,h2,h3{font-family:'Playfair Display',Georgia,serif;font-weight:600}

.header{text-align:center;padding:40px 20px 30px;border-bottom:1px solid var(--border)}
.header h1{font-size:1.8rem;margin-bottom:4px}
.header p{color:var(--text-light);font-size:.9rem}
.header a{color:var(--sage);text-decoration:none;font-weight:700}
.header a:hover{text-decoration:underline}

.container{max-width:700px;margin:0 auto;padding:30px 20px 80px}

/* FORM */
.form-group{margin-bottom:20px}
.form-group label{display:block;font-weight:700;font-size:.85rem;letter-spacing:.04em;text-transform:uppercase;color:var(--text-light);margin-bottom:6px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:'Lato',sans-serif;font-size:1rem;color:var(--text);background:var(--bg-card);transition:var(--transition);outline:none}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--sage);box-shadow:0 0 0 3px rgba(139,158,126,.15)}
.form-group textarea{min-height:200px;resize:vertical;line-height:1.7}
.form-group select{cursor:pointer}

.img-preview{margin-top:10px;max-width:100%;max-height:200px;border-radius:var(--radius);display:none}

.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border:none;border-radius:var(--radius);font-family:'Lato',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:var(--transition);letter-spacing:.02em}
.btn-primary{background:var(--sage);color:#fff}
.btn-primary:hover{background:#7a8e6e;transform:translateY(-1px)}
.btn-danger{background:var(--rose);color:#fff;padding:8px 16px;font-size:.82rem}
.btn-danger:hover{background:#b37e77}

.success-msg{background:var(--sage-bg);color:var(--sage);padding:14px 20px;border-radius:var(--radius);margin-bottom:20px;font-weight:700;display:none}

.divider{height:1px;background:var(--border);margin:40px 0}

/* POSTS LIST */
.posts-list{margin-top:20px}
.post-item{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bg-card);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow);gap:12px}
.post-item-info{flex:1;min-width:0}
.post-item-title{font-weight:700;font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.post-item-meta{font-size:.8rem;color:var(--text-lighter)}
.post-item-actions{display:flex;gap:8px;flex-shrink:0}

.empty-msg{text-align:center;padding:40px 20px;color:var(--text-lighter);font-style:italic}

@media(max-width:600px){
.post-item{flex-direction:column;align-items:flex-start}
.post-item-actions{margin-top:8px}
}
</style>
</head>
<body>

<div class="header">
<h1>Panel Admina</h1>
<p>Dodawaj i zarządzaj wpisami na blogu</p>
<p style="margin-top:8px"><a href="index.html">&larr; Wróć do bloga</a></p>
</div>

<div class="container">

<div class="success-msg" id="successMsg">Wpis został dodany!</div>

<h2 style="margin-bottom:20px">Nowy wpis</h2>

<form id="postForm">
<div class="form-group">
<label>Tytuł</label>
<input type="text" id="postTitle" placeholder="np. MARZENIA" required>
</div>

<div class="form-group">
<label>Kategoria</label>
<select id="postCat">
<option value="Uczucia">Uczucia</option>
<option value="Relacje">Relacje</option>
<option value="Siła">Siła</option>
<option value="Natura">Natura</option>
<option value="Refleksje" selected>Refleksje</option>
<option value="Wartości">Wartości</option>
<option value="Społeczeństwo">Społeczeństwo</option>
</select>
</div>

<div class="form-group">
<label>Data</label>
<input type="date" id="postDate" required>
</div>

<div class="form-group">
<label>Zdjęcie (link URL lub wybierz z dysku)</label>
<input type="text" id="postImgUrl" placeholder="https://... (wklej link do zdjęcia)">
<div style="margin:10px 0;color:var(--text-lighter);font-size:.85rem;text-align:center">lub</div>
<input type="file" id="postImgFile" accept="image/*">
<img class="img-preview" id="imgPreview">
</div>

<div class="form-group">
<label>Treść wpisu</label>
<textarea id="postText" placeholder="Napisz swój wpis tutaj..." required></textarea>
</div>

<button type="submit" class="btn btn-primary">Dodaj wpis</button>
</form>

<div class="divider"></div>

<h2>Twoje dodane wpisy</h2>
<p style="font-size:.85rem;color:var(--text-lighter);margin-bottom:10px">Wpisy zapisane w przeglądarce. Oryginalne wpisy z Blogspota nie podlegają edycji.</p>

<div class="posts-list" id="postsList"></div>

</div>

<script>
// Set today's date as default
document.getElementById("postDate").valueAsDate=new Date();

// Image preview
const imgFile=document.getElementById("postImgFile");
const imgUrl=document.getElementById("postImgUrl");
const imgPreview=document.getElementById("imgPreview");

imgFile.addEventListener("change",function(){
if(this.files&&this.files[0]){
const reader=new FileReader();
reader.onload=function(e){
imgPreview.src=e.target.result;
imgPreview.style.display="block";
imgUrl.value="";
};
reader.readAsDataURL(this.files[0]);
}
});

imgUrl.addEventListener("input",function(){
if(this.value){
imgPreview.src=this.value;
imgPreview.style.display="block";
imgFile.value="";
}else{
imgPreview.style.display="none";
}
});

// Load custom posts
function getCustomPosts(){
return JSON.parse(localStorage.getItem("usj_posts")||"[]");
}

function saveCustomPosts(posts){
localStorage.setItem("usj_posts",JSON.stringify(posts));
}

function getNextId(){
const custom=getCustomPosts();
const maxCustom=custom.reduce((max,p)=>Math.max(max,p.id),0);
return Math.max(maxCustom,1000)+1;
}

// Render posts list
function renderPostsList(){
const posts=getCustomPosts();
const list=document.getElementById("postsList");
if(posts.length===0){
list.innerHTML='<div class="empty-msg">Nie dodano jeszcze żadnych wpisów.</div>';
return;
}
posts.sort((a,b)=>b.date.localeCompare(a.date));
list.innerHTML=posts.map(p=>`
<div class="post-item">
<div class="post-item-info">
<div class="post-item-title">${p.title}</div>
<div class="post-item-meta">${p.date} &middot; ${p.cat}</div>
</div>
<div class="post-item-actions">
<a href="post.html?id=${p.id}" target="_blank" class="btn" style="padding:8px 16px;font-size:.82rem;background:var(--sage-bg);color:var(--sage)">Zobacz</a>
<button class="btn btn-danger" onclick="deletePost(${p.id})">Usuń</button>
</div>
</div>
`).join("");
}

// Delete post
window.deletePost=function(id){
if(!confirm("Na pewno chcesz usunąć ten wpis?"))return;
const posts=getCustomPosts().filter(p=>p.id!==id);
saveCustomPosts(posts);
renderPostsList();
};

// Form submit
document.getElementById("postForm").addEventListener("submit",function(e){
e.preventDefault();
const title=document.getElementById("postTitle").value.trim();
const cat=document.getElementById("postCat").value;
const date=document.getElementById("postDate").value;
const text=document.getElementById("postText").value.trim();

let img="";
if(imgUrl.value.trim()){
img=imgUrl.value.trim();
}else if(imgPreview.src&&imgPreview.style.display!=="none"){
img=imgPreview.src;
}

const post={id:getNextId(),title:title.toUpperCase(),date,cat,text,img:img||undefined};
const posts=getCustomPosts();
posts.push(post);
saveCustomPosts(posts);

// Reset form
this.reset();
document.getElementById("postDate").valueAsDate=new Date();
imgPreview.style.display="none";
imgPreview.src="";

// Show success
const msg=document.getElementById("successMsg");
msg.style.display="block";
setTimeout(()=>msg.style.display="none",3000);

renderPostsList();
});

renderPostsList();
</script>
</body>
</html>
